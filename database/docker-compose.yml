version: '3.9'

# Core sensearth Database Service
services:
  timescaledb:
    container_name: timescaledb
    image: timescale/timescaledb-ha:pg14-latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sensearth_db
    ports:
      - "5433:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    restart: always

# Monitoring Database Service
  watchdog-db:
    container_name: watchdog-db
    image: timescale/timescaledb-ha:pg14-latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monitoring_db
    ports:
      - "5434:5432"
    volumes:
      - ./data/watchdog:/var/lib/postgresql/data
    restart: always

# Monitoring API Service
  watchdog-api:
    image: python:3.8.20
    container_name: watchdog-api
    working_dir: /app
    volumes:
      - ./watchdog:/app
    command: >
      uvicorn monitoring.api:app
      --host 0.0.0.0
      --port 8001
      --reload
    ports:
      - "8001:8001"
    depends_on:
      - watchdog-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - timescaledb
    restart: always
